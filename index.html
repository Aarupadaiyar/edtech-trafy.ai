<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trafy AI: We Don't Teach AI. We Build AI Engineers.</title>
    <meta name="description" content="Build 48 real AI applications, ship 8 industry grade projects, and graduate with proof of what you can build. Trafy AI is an 8 week live, mentor led AI engineering cohort." />
    <meta name="color-scheme" content="dark light" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      (function () {
        // Dark is the primary mode. We only ever leave it if the visitor has
        // explicitly toggled to light before; we never infer from the OS or
        // browser color scheme preference.
        var stored = localStorage.getItem('theme');
        var theme = stored === 'light' ? 'light' : 'dark';
        document.documentElement.dataset.theme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
